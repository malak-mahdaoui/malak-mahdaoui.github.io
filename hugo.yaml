baseURL: "https://malak-mahdaoui.github.io/"
title: "Malak Ines MAHDAOUI | Portfolio"

# 1. On utilise le module officiel de Toha v4
theme: github.com/hugo-toha/toha/v4

module:
  imports:
    - path: github.com/hugo-toha/toha/v4
  mounts:
    - source: content
      target: content
    - source: static
      target: static
    - source: layouts
      target: layouts
    - source: data
      target: data
    - source: assets
      target: assets
    - source: i18n
      target: i18n

# 2. Configuration des langues
languages:
  en:
    languageCode: en
    languageName: English
    title: "Malak Ines MAHDAOUI"
    weight: 1

defaultContentLanguage: en

# 3. Paramètres du thème
params:
  github_user: "malak-mahdaoui"
  github_repo: "malak-mahdaoui.github.io"
  
  # Image de fond
  background: /images/site/background.jpg
  
  features:
    theme:
      enable: true
      default: system
    portfolio:
      enable: true
    footer:
      enable: true

# 4. Autoriser le HTML (important pour Toha)
markup:
  goldmark:
    renderer:
      unsafe: true