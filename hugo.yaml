baseURL: "https://malak-mahdaoui.github.io/"
title: "Malak Ines MAHDAOUI | Portfolio"
theme: "github.com/hugo-toha/toha/v4"

# Paramètres de base
params:
  # Ton nom d'utilisateur GitHub
  github_user: "malak-mahdaoui"
  # Ton dépôt (ex: malak-ines-mahdaoui.github.io)
  github_repo: "malak-ines-mahdaoui.github.io"
module:
  hugoVersion:
    min: "0.146.0"
    extended: true
  mounts:
  - source: content
    target: content
  - source: static
    target: static
  - source: layouts
    target: layouts
  - source: data
    target: data
  - source: assets
    target: assets
  - source: i18n
    target: i18n
  - source: archetypes
    target: archetypes
  - source: ../../node_modules/flag-icons/flags
    target: static/flags
  - source: ../../node_modules/@fontsource/mulish/files
    target: static/files
  - source: ../../node_modules/katex/dist/fonts
    target: static/fonts
